name: Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
      message:
        description: 'Tag message'
        required: true

permissions:
  contents: read

jobs:
  create-tag:
    permissions:
      contents: write  # for creating git tags
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create Tag
        uses: jbw976/create-tag@a7ddcd4a235fde94d00a17003f8daca5744ceb5f # allow-path-prefix
        with:
          version: ${{ github.event.inputs.version }}
          message: ${{ github.event.inputs.message }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create apis/ Tag
        uses: jbw976/create-tag@a7ddcd4a235fde94d00a17003f8daca5744ceb5f # allow-path-prefix
        with:
          version: apis/${{ github.event.inputs.version }}
          message: ${{ github.event.inputs.message }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create foo/bar/ Tag (multi-segment test)
        uses: jbw976/create-tag@a7ddcd4a235fde94d00a17003f8daca5744ceb5f # allow-path-prefix
        with:
          version: foo/bar/${{ github.event.inputs.version }}
          message: ${{ github.event.inputs.message }}
          token: ${{ secrets.GITHUB_TOKEN }}
