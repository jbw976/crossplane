# K8s provider
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-kubernetes
spec:
  package: "xpkg.upbound.io/jaredorg/provider-kubernetes-portconfig:v0.0.2"
  ignoreCrossplaneConstraints: true
  runtimeConfigRef:
    name: provider-kubernetes
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-kubernetes
spec:
  deploymentTemplate:
    spec:
      selector: { }
      template:
        spec:
          hostNetwork: true
          nodeSelector:
            kubernetes.io/os: linux
          imagePullSecrets:
            - name: crossplane-workaround
          containers:
            - name: package-runtime
              args:
                - --webhook-port=9610
  serviceTemplate:
    spec:
      ports:
        - name: webhook
          port: 9200 # doesn't matter
          targetPort: 9610
          protocol: TCP
